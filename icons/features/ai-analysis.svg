<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1e293b"/>
  
  <!-- Brain icon with chart overlay -->
  <!-- Left brain hemisphere -->
  <circle cx="38" cy="42" r="12" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <!-- Right brain hemisphere -->
  <circle cx="58" cy="42" r="12" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <!-- Brain stem -->
  <path d="M 48 54 Q 48 64 45 72" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Chart lines (uptrend) -->
  <path d="M 65 72 L 75 62 L 82 68 L 92 48" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Chart dots -->
  <circle cx="75" cy="62" r="2.5" fill="#7c3aed"/>
  <circle cx="82" cy="68" r="2.5" fill="#7c3aed"/>
  <circle cx="92" cy="48" r="2.5" fill="#7c3aed"/>
  
  <!-- Grid lines (subtle) -->
  <line x1="65" y1="75" x2="95" y2="75" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="65" y1="45" x2="95" y2="45" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
</svg>
