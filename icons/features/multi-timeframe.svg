<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1e293b"/>
  
  <!-- Clock body -->
  <circle cx="64" cy="64" r="28" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Clock center dot -->
  <circle cx="64" cy="64" r="3" fill="#22d3ee"/>
  
  <!-- Hour hand -->
  <line x1="64" y1="64" x2="64" y2="44" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="64" y1="64" x2="78" y2="64" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Time markers -->
  <line x1="64" y1="38" x2="64" y2="42" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="64" x2="84" y2="64" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="90" x2="64" y2="94" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="64" x2="44" y2="64" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Overlapping frames (timeframes) -->
  <rect x="36" y="48" width="20" height="20" rx="3" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <rect x="72" y="72" width="20" height="20" rx="3" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
