<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1">
    <line x1="80" y1="140" x2="432" y2="140"/>
    <line x1="80" y1="210" x2="432" y2="210"/>
    <line x1="80" y1="280" x2="432" y2="280"/>
    <line x1="80" y1="350" x2="432" y2="350"/>
  </g>
  <!-- Candlestick chart -->
  <g filter="url(#glow-filter)">
    <!-- Candle 1 - red -->
    <line x1="120" y1="200" x2="120" y2="340" stroke="url(#red)" stroke-width="3" stroke-linecap="round"/>
    <rect x="108" y="230" width="24" height="70" rx="3" fill="url(#red)"/>
    <!-- Candle 2 - green -->
    <line x1="172" y1="220" x2="172" y2="360" stroke="url(#green)" stroke-width="3" stroke-linecap="round"/>
    <rect x="160" y="260" width="24" height="60" rx="3" fill="url(#green)"/>
    <!-- Candle 3 - red -->
    <line x1="224" y1="240" x2="224" y2="380" stroke="url(#red)" stroke-width="3" stroke-linecap="round"/>
    <rect x="212" y="270" width="24" height="70" rx="3" fill="url(#red)"/>
    <!-- Candle 4 - green (big) -->
    <line x1="276" y1="190" x2="276" y2="350" stroke="url(#green)" stroke-width="3" stroke-linecap="round"/>
    <rect x="264" y="220" width="24" height="90" rx="3" fill="url(#green)"/>
    <!-- Candle 5 - green -->
    <line x1="328" y1="150" x2="328" y2="280" stroke="url(#green)" stroke-width="3" stroke-linecap="round"/>
    <rect x="316" y="170" width="24" height="70" rx="3" fill="url(#green)"/>
    <!-- Candle 6 - green (surge) -->
    <line x1="380" y1="110" x2="380" y2="240" stroke="url(#green)" stroke-width="3" stroke-linecap="round"/>
    <rect x="368" y="130" width="24" height="70" rx="3" fill="url(#green)"/>
  </g>
  <!-- Trend line -->
  <path d="M 108 280 Q 200 310 276 240 Q 340 190 392 140" stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Glow dot at end -->
  <circle cx="392" cy="140" r="8" fill="#a78bfa" opacity="0.6"/>
  <circle cx="392" cy="140" r="4" fill="#c4b5fd"/>
  <!-- "M" lettermark -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" fill="url(#accent)" letter-spacing="-2">MODUS</text>
</svg>
