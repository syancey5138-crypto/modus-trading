<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ogBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ogVioletGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ogCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1" />
    </linearGradient>
    
    <radialGradient id="ogGlowGrad" cx="30%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.02" />
    </radialGradient>
    
    <filter id="ogBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBgGrad)"/>
  
  <!-- Glow effects -->
  <rect width="1200" height="630" fill="url(#ogGlowGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="#7c3aed" opacity="0.08"/>
  <circle cx="1100" cy="550" r="150" fill="#a78bfa" opacity="0.05"/>
  <circle cx="600" cy="0" r="100" fill="#22d3ee" opacity="0.04"/>
  
  <!-- Left side: MODUS Logo -->
  <g transform="translate(80, 100)">
    <!-- Logo background -->
    <rect x="0" y="0" width="320" height="320" rx="16" fill="rgba(255,255,255,0.02)" stroke="#7c3aed" stroke-width="2" opacity="0.2"/>
    
    <!-- Stylized M Logo -->
    <g transform="translate(40, 40)">
      <!-- Left leg -->
      <path d="M 20 200 L 20 60 Q 20 40 40 40 L 40 200" 
            fill="none" stroke="url(#ogVioletGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Valley dip -->
      <path d="M 40 100 Q 80 70 120 110" 
            fill="none" stroke="url(#ogVioletGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      
      <!-- Right leg -->
      <path d="M 120 160 L 120 40 Q 120 40 140 40 L 140 200" 
            fill="none" stroke="url(#ogVioletGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Chart accent -->
      <g transform="translate(160, 90)">
        <rect x="0" y="30" width="8" height="20" fill="#10b981"/>
        <rect x="12" y="15" width="8" height="35" fill="#34d399"/>
        <rect x="24" y="0" width="8" height="50" fill="#10b981"/>
      </g>
    </g>
  </g>
  
  <!-- Right side: Chart visualization with indicators -->
  <g transform="translate(480, 80)">
    <!-- Chart container -->
    <rect x="0" y="0" width="680" height="470" rx="12" fill="rgba(255,255,255,0.01)" stroke="#a78bfa" stroke-width="2" opacity="0.25"/>
    
    <!-- Price axis labels -->
    <text x="-40" y="30" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1" opacity="0.7">
      $850
    </text>
    <text x="-40" y="120" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1" opacity="0.7">
      $800
    </text>
    <text x="-40" y="210" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1" opacity="0.7">
      $750
    </text>
    <text x="-40" y="300" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1" opacity="0.7">
      $700
    </text>
    
    <!-- Horizontal level lines -->
    <line x1="0" y1="30" x2="640" y2="30" stroke="#10b981" stroke-width="2" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="0" y1="150" x2="640" y2="150" stroke="#ef4444" stroke-width="2" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="0" y1="270" x2="640" y2="270" stroke="#22d3ee" stroke-width="2" opacity="0.2" stroke-dasharray="4,4"/>
    
    <!-- Main candlestick pattern -->
    <g>
      <!-- Candle 1 -->
      <line x1="50" y1="120" x2="50" y2="180" stroke="#10b981" stroke-width="3"/>
      <rect x="40" y="145" width="20" height="28" fill="#10b981"/>
      
      <!-- Candle 2 -->
      <line x1="100" y1="100" x2="100" y2="200" stroke="#ef4444" stroke-width="3"/>
      <rect x="90" y="140" width="20" height="35" fill="#ef4444"/>
      
      <!-- Candle 3 -->
      <line x1="150" y1="130" x2="150" y2="190" stroke="#10b981" stroke-width="3"/>
      <rect x="140" y="155" width="20" height="28" fill="#10b981"/>
      
      <!-- Candle 4 -->
      <line x1="200" y1="60" x2="200" y2="210" stroke="#34d399" stroke-width="3"/>
      <rect x="190" y="110" width="20" height="65" fill="#34d399"/>
      
      <!-- Candle 5 -->
      <line x1="250" y1="20" x2="250" y2="220" stroke="#34d399" stroke-width="3"/>
      <rect x="240" y="80" width="20" height="85" fill="#34d399"/>
      
      <!-- Candle 6 -->
      <line x1="300" y1="80" x2="300" y2="200" stroke="#10b981" stroke-width="3"/>
      <rect x="290" y="125" width="20" height="60" fill="#10b981"/>
      
      <!-- Candle 7 -->
      <line x1="350" y1="40" x2="350" y2="210" stroke="#34d399" stroke-width="3"/>
      <rect x="340" y="95" width="20" height="80" fill="#34d399"/>
      
      <!-- Candle 8 -->
      <line x1="400" y1="75" x2="400" y2="205" stroke="#10b981" stroke-width="3"/>
      <rect x="390" y="120" width="20" height="65" fill="#10b981"/>
    </g>
    
    <!-- Trend line (upward) -->
    <polyline points="50,150 100,120 150,140 200,80 250,30 300,110 350,70 400,130" 
              fill="none" stroke="url(#ogVioletGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Support level indicator -->
    <g transform="translate(450, 350)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#22d3ee" opacity="0.8">
        Support: $720
      </text>
      <line x1="140" y1="-8" x2="150" y2="-8" stroke="#22d3ee" stroke-width="2"/>
    </g>
    
    <!-- Resistance level indicator -->
    <g transform="translate(450, 380)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" opacity="0.8">
        Resistance: $850
      </text>
      <line x1="160" y1="-8" x2="170" y2="-8" stroke="#ef4444" stroke-width="2"/>
    </g>
    
    <!-- Moving average line -->
    <polyline points="50,165 100,155 150,160 200,145 250,120 300,135 350,110 400,145" 
              fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6" stroke-dasharray="3,3" filter="url(#ogBlur)"/>
  </g>
  
  <!-- Bottom text section -->
  <g transform="translate(0, 570)">
    <!-- Background bar -->
    <rect x="0" y="0" width="1200" height="60" fill="rgba(255,255,255,0.02)" opacity="0.8"/>
    
    <!-- Main title -->
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#a78bfa" letter-spacing="-1">
      MODUS
    </text>
    
    <!-- Subtitle -->
    <text x="340" y="35" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1" letter-spacing="0.5">
      AI-Powered Trading Analytics Platform
    </text>
    
    <!-- Accent dot -->
    <circle cx="1100" cy="30" r="6" fill="url(#ogVioletGrad)"/>
  </g>
</svg>
